<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillSwap | Real-time Chat</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #8b5cf6;
        --primary-dark: #7c3aed;
        --secondary: #ec4899;
        --bg-dark: #0f172a;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #f8fafc;
        --text-dim: #94a3b8;
        --success: #10b981;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Outfit", "Cairo", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--text-main);
        overflow: hidden;
      }

      .app-container {
        width: 95vw;
        height: 90vh;
        max-width: 1200px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        display: flex;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        position: relative;
      }

      .sidebar {
        width: 300px;
        background: rgba(0, 0, 0, 0.2);
        border-left: 1px solid var(--glass-border);
        display: flex;
        flex-direction: column;
      }

      .sidebar-header {
        padding: 30px 20px;
        border-bottom: 1px solid var(--glass-border);
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0.05);
        padding: 12px;
        border-radius: 12px;
        margin-top: 15px;
      }

      .avatar {
        width: 40px;
        height: 40px;
        background: linear-gradient(45deg, var(--primary), var(--secondary));
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
      }

      .room-section {
        flex: 1;
        overflow-y: auto;
        padding: 20px 10px;
      }

      .section-title {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-dim);
        margin: 20px 10px 10px;
      }

      .room-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 15px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 5px;
        border: 1px solid transparent;
      }

      .room-item:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateX(-5px);
      }

      .room-item.active {
        background: rgba(139, 92, 246, 0.15);
        border-color: rgba(139, 92, 246, 0.3);
        color: var(--primary);
      }

      .room-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
      }

      .chat-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: rgba(0, 0, 0, 0.1);
      }

      .chat-header {
        padding: 20px 30px;
        background: rgba(0, 0, 0, 0.1);
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .current-room-info h2 {
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .connection-status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        color: var(--text-dim);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ef4444;
      }

      .status-dot.online {
        background: var(--success);
        box-shadow: 0 0 10px var(--success);
      }

      .messages-container {
        flex: 1;
        padding: 30px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .msg-wrapper {
        display: flex;
        flex-direction: column;
        max-width: 70%;
      }

      .msg-wrapper.me {
        align-self: flex-start;
      }

      .msg-wrapper.others {
        align-self: flex-end;
      }

      .msg-bubble {
        padding: 12px 18px;
        border-radius: 18px;
        font-size: 0.95rem;
        line-height: 1.5;
        position: relative;
      }

      .msg-wrapper.me .msg-bubble {
        background: var(--primary);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .msg-wrapper.others .msg-bubble {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-main);
        border-bottom-left-radius: 4px;
      }

      .msg-info {
        font-size: 0.7rem;
        color: var(--text-dim);
        margin-top: 5px;
        display: flex;
        gap: 8px;
      }

      .msg-wrapper.me .msg-info {
        text-align: right;
        justify-content: flex-end;
      }

      .input-area {
        padding: 25px 30px;
        background: rgba(0, 0, 0, 0.2);
        display: flex;
        gap: 15px;
        align-items: center;
      }

      .input-wrapper {
        flex: 1;
        position: relative;
      }

      #messageInput {
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        padding: 14px 20px;
        color: white;
        outline: none;
        transition: all 0.3s ease;
      }

      #messageInput:focus {
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.08);
      }

      .send-btn {
        width: 50px;
        height: 50px;
        border-radius: 14px;
        background: var(--primary);
        border: none;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
      }

      .send-btn:hover {
        transform: scale(1.05);
        background: var(--primary-dark);
      }

      .typing-hint {
        position: absolute;
        top: -25px;
        right: 0;
        font-size: 0.75rem;
        color: var(--primary);
        font-style: italic;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .msg-wrapper {
        animation: fadeIn 0.3s ease forwards;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="sidebar">
        <div class="sidebar-header">
          <h1
            style="font-size: 1.5rem; color: var(--primary); margin-bottom: 5px"
          >
            SkillSwap
          </h1>
          <p style="font-size: 0.8rem; color: var(--text-dim)">
            Real-time Ecosystem
          </p>

          <div class="user-info">
            <div class="avatar" id="userAvatar">?</div>
            <div>
              <div
                style="font-size: 0.9rem; font-weight: 600"
                id="userNameDisp"
              >
                Loading...
              </div>
              <div
                style="font-size: 0.7rem; color: var(--text-dim)"
                id="userIdDisp"
              >
                ID: ----
              </div>
            </div>
          </div>
        </div>

        <div class="room-section">
          <div class="section-title">العام</div>
          <div
            class="room-item active"
            onclick="switchRoom('global_chat', 'الجروب العام', 'globe')"
          >
            <div class="room-icon"><i class="fas fa-globe"></i></div>
            <span>الجروب العام</span>
          </div>

          <div class="section-title">التراكات المتاحة</div>
          <div id="track-list">
            <div
              style="padding: 10px; font-size: 0.8rem; color: var(--text-dim)"
            >
              جاري تحميل التراكات...
            </div>
          </div>

          <div class="section-title">محادثات خاصة</div>
          <div id="private-list">
            <div class="room-item add-btn" onclick="openPrivateChat()">
              <div class="room-icon"><i class="fas fa-user-plus"></i></div>
              <span style="font-size: 0.85rem">بدء محادثة مع يوزر</span>
            </div>
          </div>

          <div class="section-title">دخول مباشر</div>
          <div class="room-item add-btn" onclick="joinByManualId()">
            <div class="room-icon"><i class="fas fa-hashtag"></i></div>
            <span>دخول عن طريق Room ID</span>
          </div>
        </div>
      </div>

      <div class="chat-main">
        <div class="chat-header">
          <div class="current-room-info">
            <h2 id="currentRoomTitle">
              <i class="fas fa-globe"></i> الجروب العام
            </h2>
          </div>
          <div class="connection-status">
            <span id="connText">جاري الاتصال</span>
            <div class="status-dot" id="connDot"></div>
          </div>
        </div>

        <div class="messages-container" id="messagesBox">
          <div
            style="text-align: center; color: var(--text-dim); margin-top: 50px"
          >
            <i
              class="fas fa-lock"
              style="
                display: block;
                font-size: 2rem;
                margin-bottom: 10px;
                opacity: 0.3;
              "
            ></i>
            <p>أهلاً بك في SkillSwap Chat</p>
            <p style="font-size: 0.8rem">اختر تراك أو ابدأ محادثة خاصة</p>
          </div>
        </div>

        <div class="input-area">
          <div class="input-wrapper">
            <div class="typing-hint" id="typingHint"></div>
            <input
              type="text"
              id="messageInput"
              placeholder="اكتب رسالتك هنا..."
              autocomplete="off"
            />
          </div>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      let socket;
      let typingTimeout;
      let currentUserId;
      let currentRoomId = "global_chat";

      const messagesBox = document.getElementById("messagesBox");
      const connText = document.getElementById("connText");
      const connDot = document.getElementById("connDot");
      const typingHint = document.getElementById("typingHint");
      const msgInput = document.getElementById("messageInput");

      function parseJwt(token) {
        var base64Url = token.split(".")[1];
        var base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
        var jsonPayload = decodeURIComponent(
          window
            .atob(base64)
            .split("")
            .map(function (c) {
              return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
            })
            .join(""),
        );
        return JSON.parse(jsonPayload);
      }

      function connectSocket() {
        const tokenInput = prompt(
          "ادخل الـ Access Token بتاعك (بدون Bearer):",
          "eyJhbGciOi...",
        );

        if (!tokenInput || tokenInput.length < 20) {
          alert("لازم تدخل توكن عشان تتصل بالسوكيت!");
          return;
        }

            const rawToken = tokenInput.replace(/^Bearer\s+/, '').replace(/^skill-swap\s+/, '').trim();
            let finalToken = 'skill-swap ' + rawToken;

        try {
          const decoded = parseJwt(rawToken);
          currentUserId = decoded.id;

          document.getElementById("userIdDisp").innerText =
            "ID: " + currentUserId;
          document.getElementById("userAvatar").innerText = "U";
        } catch (e) {
          console.error(e);
          alert("التوكن مش سليم!");
          return;
        }

        socket = io({
          extraHeaders: {
            Authorization: finalToken,
          },
        });

        socket.on("connect", () => {
          connText.innerText = "متصل";
          connDot.classList.add("online");

          socket.emit("join_chat", {
            chatId: "global_chat",
            userId: currentUserId,
          });
        });

        socket.on("connect_error", (err) => {
          console.error("Connection Error:", err.message);
          alert("فشل الاتصال: " + err.message);
          connText.innerText = "فشل الاتصال";
          connDot.classList.remove("online");
        });

        socket.on("disconnect", () => {
          connText.innerText = "غير متصل";
          connDot.classList.remove("online");
        });

        socket.on("receive_message", (data) => {
          if (data.chatId === currentRoomId) {
            if (data.senderId !== currentUserId) {
              appendMessage(data);
            }
          }
        });

        socket.on("history_messages", (data) => {
          console.log("History received:", data.messages.length);

          const header = messagesBox.firstChild
            ? messagesBox.firstChild.outerHTML
            : "";
          messagesBox.innerHTML =
            header +
            `<div style="text-align:center; color:var(--text-dim); font-size:0.7rem; margin:5px 0;">-- أرشيف المحادثة السابقة --</div>`;

          data.messages.forEach((msg) => {
            let senderName = "Unknown";
            let senderIdStr = "unknown";

            if (msg.senderId && typeof msg.senderId === "object") {
              senderName = msg.senderId.userName || "User";
              senderIdStr = msg.senderId._id
                ? msg.senderId._id.toString()
                : "unknown";
            } else {
              senderIdStr = msg.senderId ? msg.senderId.toString() : "unknown";
              senderName = senderIdStr;
            }

            const isMe = senderIdStr === currentUserId;

            const formattedMsg = {
              message: msg.content,
              senderId: senderName,
              timestamp: msg.createdAt || msg.localTimestamp,
            };

            appendMessage(formattedMsg, isMe);
          });

          messagesBox.scrollTop = messagesBox.scrollHeight;
        });

        socket.on("typing", (data) => {
          if (data.chatId === currentRoomId && data.userId !== currentUserId) {
            typingHint.innerText = `${data.userId} يكتب الآن...`;
          }
        });

        socket.on("stop_typing", (data) => {
          if (data.chatId === currentRoomId) {
            typingHint.innerText = "";
          }
        });
      }

      const mockTracksFromDB = [
        { id: "1", name: "JavaScript", slug: "javascript", icon: "fab fa-js" },
        { id: "2", name: "Python", slug: "python", icon: "fab fa-python" },
        { id: "3", name: "PHP", slug: "php", icon: "fab fa-php" },
        { id: "4", name: "C++", slug: "cpp", icon: "fas fa-terminal" },
        { id: "5", name: "UI/UX", slug: "uiux", icon: "fas fa-palette" },
      ];

      function loadTracksFromTable() {
        const trackList = document.getElementById("track-list");
        trackList.innerHTML = "";

        mockTracksFromDB.forEach((track) => {
          const roomId = `track_${track.slug}`;
          const item = document.createElement("div");
          item.className = "room-item";
          item.onclick = (e) => {
            switchRoom(roomId, `${track.name} Group`, "code", e);
          };
          item.innerHTML = `
                    <div class="room-icon"><i class="${track.icon}"></i></div>
                    <span>${track.name}</span>
                `;
          trackList.appendChild(item);
        });
      }

      function switchRoom(roomId, title, icon, eventObj) {
        if (currentRoomId === roomId) return;

        document
          .querySelectorAll(".room-item")
          .forEach((el) => el.classList.remove("active"));
        const clickedItem = eventObj ? eventObj.currentTarget : null;
        if (clickedItem) clickedItem.classList.add("active");

        document.getElementById("currentRoomTitle").innerHTML =
          `<i class="fas fa-${icon}"></i> ${title}`;
        messagesBox.innerHTML = `<div style="text-align:center; color:var(--text-dim); font-size:0.8rem; margin:10px 0;">-- بداية المحادثة في ${title} --</div>`;

        socket.emit("leave_chat", {
          chatId: currentRoomId,
          userId: currentUserId,
        });
        currentRoomId = roomId;
        socket.emit("join_chat", {
          chatId: currentRoomId,
          userId: currentUserId,
        });

        console.log(`Switched to: ${title}`);
      }

      function sendMessage() {
        const text = msgInput.value.trim();
        if (!text) return;

        const payload = {
          chatId: currentRoomId,
          senderId: currentUserId,
          message: text,
          messageType: "text",
        };

        socket.emit("send_message", payload);
        msgInput.value = "";

        appendMessage(
          {
            ...payload,
            timestamp: new Date(),
          },
          true,
        );

        socket.emit("stop_typing", {
          chatId: currentRoomId,
          userId: currentUserId,
        });
      }

      function appendMessage(data, isMe = false) {
        const actualIsMe = data.senderId === currentUserId;

        const wrapper = document.createElement("div");
        wrapper.className = `msg-wrapper ${actualIsMe ? "me" : "others"}`;

        const time = new Date(data.timestamp).toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });

        wrapper.innerHTML = `
                <div class="msg-bubble">
                    ${data.message}
                </div>
                <div class="msg-info">
                    <span>${data.senderId}</span>
                    <span>•</span>
                    <span>${time}</span>
                </div>
            `;

        messagesBox.appendChild(wrapper);
        messagesBox.scrollTop = messagesBox.scrollHeight;
      }

      function openPrivateChat() {
        const targetId = prompt("ادخل الـ ID بتاع اليوزر:");
        if (targetId) {
          const partnerId = targetId.trim();
          const sorted = [currentUserId, partnerId].sort();
          const privateRoomId = `private_${sorted[0]}_${sorted[1]}`;

          const privateList = document.getElementById("private-list");
          const newItem = document.createElement("div");
          newItem.className = "room-item active";
          newItem.onclick = (e) =>
            switchRoom(privateRoomId, `مع: ${partnerId}`, "user", e);
          newItem.innerHTML = `
                    <div class="room-icon"><i class="fas fa-user"></i></div>
                    <span>${partnerId}</span>
                `;
          privateList.insertBefore(newItem, privateList.lastElementChild);
          newItem.click();
        }
      }

      msgInput.addEventListener("input", () => {
        socket.emit("typing", { chatId: currentRoomId, userId: currentUserId });

        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          socket.emit("stop_typing", {
            chatId: currentRoomId,
            userId: currentUserId,
          });
        }, 1500);
      });

      msgInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      window.addEventListener("load", () => {
        connectSocket();
        loadTracksFromTable();
      });
    </script>
  </body>
</html>
