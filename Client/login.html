<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Swap - Admin Login</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: var(--bg-body);
      }
      .login-card {
        background: var(--bg-card);
        padding: 2rem;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        width: 100%;
        max-width: 400px;
        border: 1px solid var(--border-color);
      }
      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }
      .login-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 0.5rem;
      }
      .login-subtitle {
        color: var(--text-muted);
        font-size: 0.875rem;
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-main);
        font-weight: 500;
      }
      .form-input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-color);
        background: var(--bg-body);
        color: var(--text-main);
        border-radius: var(--radius-md);
        font-size: 0.875rem;
      }
      .form-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
      }
      .btn-full {
        width: 100%;
      }
      .error-message {
        color: var(--danger);
        font-size: 0.875rem;
        margin-top: 0.5rem;
        text-align: center;
        display: none;
      }
    </style>
  </head>
  <body>
    <script>
      if (window.location.protocol === 'file:') {
        const div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#fff1f2;color:#be123c;padding:1rem;text-align:center;z-index:9999;border-bottom:1px solid #ffe4e6;font-family:system-ui,sans-serif';
        div.innerHTML = '<strong>Running from file system detected.</strong> Please access functionality via <a href="http://localhost:5000/" style="color:#be123c;text-decoration:underline;font-weight:bold">http://localhost:5000/</a> to avoid CORS errors.';
        document.body.appendChild(div);
      }
    </script>
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">Skill Swap Admin</h1>
        <p class="login-subtitle">Sign in to manage the platform</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="admin@example.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        <div id="error-msg" class="error-message"></div>
      </form>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/login.js"></script>
  </body>
</html>
