<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Swap - Admin Dashboard</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Icons (Remix Icon) -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/variables.css" />
    <link rel="stylesheet" href="/assets/css/style.css">
    
    <!-- Page Styles -->
    <link rel="stylesheet" href="/pages/dashboard/dashboard.css">
    <link rel="stylesheet" href="/pages/users/users.css">

    <link rel="stylesheet" href="/pages/sessions/sessions.css">

    <link rel="stylesheet" href="/pages/payments/payments.css">
    <link rel="stylesheet" href="/pages/reports/reports.css">
    <link rel="stylesheet" href="/pages/tracks/tracks.css">
    <link rel="stylesheet" href="/pages/store/store.css">
</head>

<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="ri-rocket-2-fill"></i>
                    </div>
                    <span>Skill Swap</span>
                </div>
            </div>

            <nav class="sidebar-menu">
                <ul>
                    <li class="menu-header">Overview</li>
                    <li><a href="#" class="nav-link active" data-page="dashboard"><i class="ri-dashboard-fill"></i>
                            <span>Dashboard</span></a></li>

                    <li class="menu-header">Management</li>
                    <li><a href="#" class="nav-link" data-page="users"><i class="ri-group-fill"></i>
                            <span>Users</span></a></li>

                    <li><a href="#" class="nav-link" data-page="sessions"><i class="ri-calendar-todo-fill"></i>
                            <span>Sessions</span></a></li>


                    <li class="menu-header">Finance</li>
                    <li><a href="#" class="nav-link" data-page="payments"><i class="ri-bank-card-fill"></i>
                            <span>Payments</span></a></li>

                    <li><a href="#" class="nav-link" data-page="reports"><i class="ri-pie-chart-2-fill"></i>
                            <span>Reports</span></a></li>

                    <li class="menu-header">Data</li>
                    <li><a href="#" class="nav-link" data-page="tracks"><i class="ri-node-tree"></i>
                            <span>Tracks</span></a></li>
                    <li><a href="#" class="nav-link" data-page="store"><i class="ri-store-2-fill"></i>
                            <span>Store Products</span></a></li>

                </ul>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="nav-link logout"><i class="ri-logout-circle-r-line"></i> <span>Logout</span></a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="header-left">
                    <button id="sidebar-toggle" class="icon-btn" title="Toggle Sidebar">
                        <i class="ri-menu-fold-line"></i>
                    </button>
                    <h2 id="page-title">Dashboard</h2>
                </div>
                <div class="header-right">
                    <div class="user-profile-dropdown">
                        <div class="user-profile" id="user-profile-toggle">
                            <img src="" alt="User" id="header-user-img">
                            <div class="user-info">
                                <span class="user-name" id="header-user-name">Loading...</span>
                                <span class="user-role" id="header-user-role">Admin</span>
                            </div>
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                        <div class="dropdown-menu" id="user-dropdown-menu">
                            <div class="dropdown-header">
                                <p>Signed in as</p>
                                <strong id="header-user-email">email@example.com</strong>
                            </div>
                            <div class="dropdown-divider"></div>
                            <a href="#" class="dropdown-item logout-link" id="logout-btn"><i class="ri-logout-box-line"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </header>



            <!-- Dynamic Content Container -->
            <div id="content-container" class="content-wrapper">
                <!-- Content will be injected here by JS -->
                <div class="loading-spinner">Loading...</div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Chart.js CDN -->
    <script src="/assets/js/data.js"></script>
    <script src="/assets/js/api.js"></script>

     <!-- Page Scripts -->
    <script src="/pages/dashboard/dashboard.js"></script>
    <script src="/pages/users/users.js"></script>

    <script src="/pages/sessions/sessions.js"></script>

    <script src="/pages/payments/payments.js"></script>
    <script src="/pages/reports/reports.js"></script>
    <script src="/pages/tracks/tracks.js"></script>
    <script src="/pages/store/store.js"></script>

    <script src="/assets/js/notifications.js"></script>
    <script src="/assets/js/main.js"></script>
  </body>
</html>
