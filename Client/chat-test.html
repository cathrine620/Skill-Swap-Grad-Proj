<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.IO Chat Test</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; margin: 0; display: flex; height: 100vh; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; background: #fff; }
        
        .setup-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #0084ff; color: #fff; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0073e6; }
        button.secondary { background: #e4e6eb; color: #050505; margin-top: 5px; }
        
        #status { padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; text-align: center; }
        .status-online { background: #e7f3ff; color: #1877f2; }
        .status-offline { background: #f2f2f2; color: #65676b; }
        .status-error { background: #ffebe9; color: #f02849; }
        
        #messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #f0f2f5; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .message.sent { align-self: flex-end; background: #0084ff; color: #fff; border-bottom-right-radius: 4px; }
        .message.received { align-self: flex-start; background: #fff; color: #050505; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message .sender { font-size: 11px; margin-bottom: 4px; opacity: 0.8; font-weight: bold; }
        .message .time { font-size: 10px; margin-top: 4px; opacity: 0.7; text-align: right; }
        .message.system { align-self: center; background: rgba(0,0,0,0.05); color: #65676b; font-size: 12px; border-radius: 10px; }
        
        .input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        #message-input { flex: 1; border-radius: 20px; padding: 10px 20px; }
        
        .typing-indicator { font-size: 12px; color: #65676b; height: 20px; margin-bottom: 5px; margin-left: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Chat Test</h2>
            <div id="status" class="status-offline">Not connected</div>
            
            <div class="setup-group">
                <label>Auth Token (no bearer prefix)</label>
                <input type="text" id="token" placeholder="Paste JWT here">
                
                <label>Chat ID / Room Name</label>
                <input type="text" id="chatId" placeholder="global_chat or ObjectId">
                
                <button onclick="connect()" style="width: 100%;">Connect to Socket</button>
                <button onclick="joinRoom()" class="secondary" style="width: 100%;">Join Room / History</button>
            </div>
            
            <div style="margin-top: auto; font-size: 12px; color: #65676b;">
                <p><strong>Events:</strong><br>
                - join_chat<br>
                - send_message<br>
                - receive_message<br>
                - history_messages</p>
            </div>
        </div>
        
        <div class="main">
            <div id="messages-container">
                <div class="message system">Connect and join a room to start chatting</div>
            </div>
            <div class="typing-indicator" id="typing-text"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Type a message..." onkeypress="handleKey(event)" oninput="handleTyping()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let currentChatId = null;
        let myUserId = null;
        let typingTimeout = null;

        function setStatus(text, type) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = 'status-' + type;
        }

        function connect() {
            const token = document.getElementById('token').value;
            if (!token) {
                setStatus("Token Required", "error");
                return;
            }

            if (socket) socket.disconnect();

            // Replace with your server URL
            socket = io('http://localhost:5000', {
                auth: { token: 'skill-swap ' + token }
            });

            socket.on('connect', () => {
                setStatus("Connected", "online");
                appendMessage('system', 'Socket connected successfully');
                
                // Extract my ID from token
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    myUserId = payload.id;
                } catch(e) {}
            });

            socket.on('connect_error', (err) => {
                setStatus("Connection error", "error");
                appendMessage('system', 'Error: ' + err.message);
            });

            socket.on('receive_message', (data) => {
                appendMessage('received', data.message, data.senderId, data.timestamp);
            });

            socket.on('history_messages', (data) => {
                appendMessage('system', 'Loaded ' + data.messages.length + ' history messages');
                data.messages.forEach(msg => {
                    const type = msg.senderId?._id === myUserId || msg.senderId === myUserId ? 'sent' : 'received';
                    const sender = msg.senderId?.userName || msg.senderId;
                    appendMessage(type, msg.content, sender, msg.createdAt);
                });
            });

            socket.on('typing', (data) => {
                if (data.userId !== myUserId) {
                    document.getElementById('typing-text').textContent = 'Someone is typing...';
                }
            });

            socket.on('stop_typing', () => {
                document.getElementById('typing-text').textContent = '';
            });

            socket.on('chat_error', (data) => {
                appendMessage('system', 'Error: ' + data.message);
            });
        }

        function joinRoom() {
            if (!socket || !socket.connected) {
                setStatus("Connect first", "error");
                return;
            }
            const chatId = document.getElementById('chatId').value;
            if (!chatId) return;

            currentChatId = chatId;
            socket.emit('join_chat', { chatId, userId: myUserId });
            appendMessage('system', 'Joining: ' + chatId);
            setStatus("In Chat: " + chatId, "online");
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message || !currentChatId) return;

            socket.emit('send_message', {
                chatId: currentChatId,
                message: message
            });

            appendMessage('sent', message, 'Me', new Date());
            input.value = '';
            socket.emit('stop_typing', { chatId: currentChatId });
        }

        function appendMessage(type, content, sender, time) {
            const container = document.getElementById('messages-container');
            const div = document.createElement('div');
            div.className = 'message ' + type;
            
            const timeStr = time ? new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
            
            if (type === 'system') {
                div.textContent = content;
            } else {
                div.innerHTML = `
                    <div class="sender">${sender || 'Unknown'}</div>
                    <div class="content">${content}</div>
                    <div class="time">${timeStr}</div>
                `;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function handleTyping() {
            if (!currentChatId) return;
            
            socket.emit('typing', { chatId: currentChatId, userId: myUserId });
            
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('stop_typing', { chatId: currentChatId });
            }, 2000);
        }
    </script>
</body>
</html>
